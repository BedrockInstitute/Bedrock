# Bedrock translation glossary -- canonical, machine-checked term data.
#
# This TOML file is the single source of truth for the trilingual glossary; the prose
# explanation (what the checks do, how to maintain entries) lives in dev/GLOSSARY.md.
# scripts/check-glossary.py reads this file via tomllib (Python 3.11+) and enforces it as
# part of `make check` and the pre-commit hook.
#
# Each [[term]] has: category, en, zh, ja; optional avoid (a list of known wrong
# renderings, each optionally tagged `zh:`/`ja:` to scope it to one language; an untagged
# entry applies to both); optional presence (true enables the safety-net check); optional
# notes (human-only; the checker ignores it). CJK values are plain strings -- TOML is not
# prose-linted, so no backtick wrapping is needed.

